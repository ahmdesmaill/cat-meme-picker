<!doctype html>
<html lang="en">
    <head>
        <title>Cats ✨</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Karla:wght@400;800&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header class="stylized-color">
            <img
                src="./images/pumpkin.png"
                alt="The cat called Pumpkin looking at the website logo."
            />
            <h1 aria-label="Pumpkin's perfect meme picker.">
                Pumpkin's Purrfect...<br /><span>Meme Picker</span>
            </h1>
        </header>
        <main>
            <label
                for="emotion-selector"
                class="bold"
                id="emotion-selector-label"
                >Select Your Current Emotion</label
            >
            <select class="bold stylized-color" id="emotion-selector"></select>
            <div id="gifs-checkbox-container">
                <label for="gifs-only-checkbox">Animated GIFs only</label>
                <input id="gifs-only-checkbox" type="checkbox" />
            </div>
            <button class="stylized-color" id="get-image-btn" type="button">
                Get Image
            </button>
        </main>
        <div id="meme-modal">
            <button id="meme-modal-close-btn">X</button>
            <div id="meme-modal-image-container">
                <img src="./images/confused.gif" />
            </div>
        </div>
        <script src="./main.js" type="module"></script>
    </body>
</html>
